intent: cloud_account
flavor: gcp_provider
version: '1.0'
description: Configures GCP provider credentials for downstream modules
intentDetails:
  type: Cloud & Infrastructure
  description: Configure GCP provider authentication - supports gcloud CLI auth, service account key file, or inline JSON credentials
  displayName: Cloud Account
  iconUrl: https://raw.githubusercontent.com/Facets-cloud/facets-modules-redesign/main/icons/cloud_account.svg
clouds:
- gcp
stateful: true
spec:
  title: GCP Cloud Account
  description: Configure GCP provider credentials. Uses gcloud auth application-default login if credentials fields are omitted.
  type: object
  properties:
    project:
      type: string
      title: Project ID
      description: GCP project ID
    region:
      type: string
      title: Region
      description: GCP region for resource deployment
    credentials_file:
      type: string
      title: Credentials File
      description: Path to service account JSON key file (optional if using gcloud auth application-default login)
    credentials_json:
      type: string
      title: Credentials JSON
      description: Inline service account JSON key (optional, prefer credentials_file or gcloud auth. Use raptor2 secrets for production)
  required:
  - project
  - region
outputs:
  default:
    type: '@facets/gcp_cloud_account'
    providers:
      google:
        source: hashicorp/google
        version: '>= 6.43.0'
        attributes:
          project: attributes.project
          credentials: attributes.credentials
      google-beta:
        source: hashicorp/google-beta
        version: '>= 6.43.0'
        attributes:
          project: attributes.project
          credentials: attributes.credentials
sample:
  version: '1.0'
  flavor: gcp_provider
  kind: cloud_account
  disabled: false
  spec:
    project: ""
    region: ""
iac:
  validated_files:
  - variables.tf
