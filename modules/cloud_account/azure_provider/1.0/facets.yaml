intent: cloud_account
flavor: azure_provider
version: '1.0'
description: Configures Azure provider credentials for downstream modules
intentDetails:
  type: Cloud & Infrastructure
  description: Configure Azure provider authentication - supports az login defaults or service principal credentials
  displayName: Cloud Account
  iconUrl: https://raw.githubusercontent.com/Facets-cloud/facets-modules-redesign/main/icons/cloud_account.svg
clouds:
- azure
spec:
  title: Azure Cloud Account
  description: Configure Azure provider credentials. Uses az login defaults if service principal fields are omitted.
  type: object
  properties:
    subscription_id:
      type: string
      title: Subscription ID
      description: Azure subscription ID
    tenant_id:
      type: string
      title: Tenant ID
      description: Azure AD tenant ID (optional if using az login)
    client_id:
      type: string
      title: Client ID
      description: Service principal application/client ID (optional if using az login)
    client_secret:
      type: string
      title: Client Secret
      description: Service principal secret (optional if using az login, use raptor2 secrets for production)
  required:
  - subscription_id
outputs:
  default:
    type: '@facets/azure_cloud_account'
    providers:
      azurerm:
        source: hashicorp/azurerm
        version: 4.36.0
        attributes:
          features: {}
          subscription_id: attributes.subscription_id
          client_id: attributes.client_id
          client_secret: attributes.client_secret
          tenant_id: attributes.tenant_id
      azapi:
        source: Azure/azapi
        version: 2.5.0
        attributes:
          subscription_id: attributes.subscription_id
          client_id: attributes.client_id
          client_secret: attributes.client_secret
          tenant_id: attributes.tenant_id
sample:
  version: '1.0'
  flavor: azure_provider
  kind: cloud_account
  disabled: false
  spec:
    subscription_id: ""
iac:
  validated_files:
  - variables.tf
