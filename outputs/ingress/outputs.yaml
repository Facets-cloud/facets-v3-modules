name: '@facets/ingress'
properties:
  type: object
  properties:
    attributes:
      type: object
      properties:
        base_domain:
          type: string
        loadbalancer_dns:
          type: string
        loadbalancer_hostname:
          type: string
        loadbalancer_ip:
          type: string
        base_domain_enabled:
          type: boolean
        gateway_class:
          description: Gateway API GatewayClass name
          type: string
        gateway_name:
          description: Gateway API Gateway resource name
          type: string
    interfaces:
      type: object
      properties: {}
      additionalProperties:
        type: object
        properties:
          connection_string:
            type: string
          host:
            type: string
          port:
            type: number
          username:
            type: string
          password:
            type: string
          secrets:
            type: array
            items:
              type: string
providers: []
